services:
  voicepass-web:
    image: metzakaria/voicepass-web:latest
    build: .
    container_name: voicepass-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    extra_hosts:
    - "host.docker.internal:host-gateway"
    #network_mode: host
    environment:
      - HOST=0.0.0.0
      - HOSTNAME=0.0.0.0
